name: Update RSS

on:
  pull_request:
  push:
    branches:
    - main
  schedule:
    - cron: "0 */8 * * *"
    - cron: "0 20 * * *"
    - cron: "0 22 * * *"

jobs:
  update_rss_feeds:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.20.1'
      - name: Build gohumble
        run: go build -o gohumble ./cmd/
      - name: Run gohumble
        run: cd docs && ../gohumble
      - uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
