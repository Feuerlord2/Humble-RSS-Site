name: Generate RSS Manual

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build generator
        run: go build -o gohumble ./cmd/

      - name: Generate RSS and JSON files
        run: cd docs && ../gohumble

      - name: Show generated files
        run: |
          ls -la docs
          grep -R "Bundle ends:" -n docs/*.rss || true
          test -f docs/all.json
          test -f docs/urgent.json
          test -f docs/all.rss

      - name: Upload generated feed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-feeds
          path: |
            docs/books.rss
            docs/games.rss
            docs/software.rss
            docs/all.rss
            docs/all.json
            docs/urgent.json
